spring.application.name=verizon


# JWT Configuration
jwt.secret=your-256-bit-secret-key-must-be-at-least-32-characters-long
jwt.expiration = 86400000
# 24 hours in milliseconds
jwt.refresh-expiration=604800000
# 7 days in millisecond

# ==================== DATABASE CONFIGURATION ====================
# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/verizon_db
spring.datasource.username=fiifi
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA/HIBERNATE CONFIGURATION ====================
# DDL mode: update will create/update tables based on entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console
spring.jpa.show-sql=true

# Format SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# SQL dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== CONNECTION POOL ====================
# HikariCP settings (optional)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.minimum-idle=5

# ==================== LOGGING ====================
# Show bind parameters (optional)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc=DEBUG




# Enable static resource handling
spring.web.resources.add-mappings=true
spring.web.resources.static-locations = classpath:/static/

# Flutter web needs these MIME types
spring.web.resources.cache.cachecontrol.max-age = 365d
spring.web.resources.cache.cachecontrol.no-cache = false
